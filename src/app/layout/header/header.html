<div
  class="w-full bg-blaze-orange text-white px-4 py-1.5"
  role="status"
  aria-live="polite"
>
  <p class="max-w-7xl mx-auto text-center text-xs sm:text-sm leading-snug">
    +++ Es wird warm am Sonntag! Nehmt euch ausreichend zu trinken mit! Ihr nehmt auf dem
    Rundkurs als normale Verkehrsteilnehmer am Straßenverkehr teil! Nehmt Rücksicht auf
    euch und andere! +++
  </p>
</div>

<header class="bg-charcoal-blue text-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <div class="flex items-center gap-2">
        <a routerLink="/" class="flex items-center gap-2 group">
          <mat-icon class="text-honey-bronze group-hover:scale-110 transition-transform">directions_bike</mat-icon>
          <span class="text-xl font-bold tracking-tight">Roll Mit</span>
        </a>
      </div>

      <nav class="hidden md:flex items-center gap-8" aria-label="Primary">
        <ng-container *ngFor="let item of menuItems; trackBy: trackByPath">
          <a
            [routerLink]="item.path"
            [routerLinkActive]="item.highlight ? '' : 'text-honey-bronze'"
            [routerLinkActiveOptions]="{exact: item.exact}"
            class="inline-flex items-center h-9 transition-colors"
            [ngClass]="
              item.highlight
                ? 'px-3 rounded-full bg-sky-reflection/20 text-sky-reflection font-semibold hover:bg-sky-reflection/30'
                : 'font-medium hover:text-sky-reflection'
            "
          >
            {{ item.label }}
          </a>
        </ng-container>
      </nav>

      <div class="flex items-center md:hidden">
        <button
          mat-icon-button
          class="text-white"
          (click)="openMobileMenu()"
          aria-label="Open menu"
          aria-haspopup="dialog"
          [attr.aria-expanded]="mobileMenuOpen"
        >
          <mat-icon>menu</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile fullscreen overlay menu (slides in from the right) -->
  <div
    class="fixed inset-0 z-50 md:hidden"
    role="dialog"
    aria-modal="true"
    aria-label="Mobile menu"
    [attr.aria-hidden]="!mobileMenuOpen"
    [class.pointer-events-none]="!mobileMenuOpen"
  >
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-black/60 transition-opacity duration-300"
      [class.opacity-0]="!mobileMenuOpen"
      [class.opacity-100]="mobileMenuOpen"
      (click)="closeMobileMenu()"
    ></div>

    <!-- Panel -->
    <aside
      class="absolute right-0 top-0 h-full w-full bg-charcoal-blue text-white shadow-xl transform transition-transform duration-300 ease-out overflow-y-auto"
      [class.translate-x-full]="!mobileMenuOpen"
      [class.translate-x-0]="mobileMenuOpen"
    >
      <div class="flex items-center justify-between px-4 py-4 border-b border-white/10">
        <span class="text-lg font-bold">Menü</span>
        <button
          mat-icon-button
          (click)="closeMobileMenu()"
          aria-label="Close menu"
          class="text-white"
        >
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <nav class="p-4 flex flex-col gap-1" aria-label="Mobile navigation">
        <a
          *ngFor="let item of menuItems; trackBy: trackByPath"
          [routerLink]="item.path"
          [routerLinkActive]="item.highlight ? '' : 'text-honey-bronze'"
          [routerLinkActiveOptions]="{exact: item.exact}"
          (click)="closeMobileMenu()"
          class="inline-flex items-center min-h-9 px-3 py-2 rounded-md transition-colors"
          [ngClass]="
            item.highlight
              ? 'bg-sky-reflection/20 text-sky-reflection font-semibold hover:bg-sky-reflection/30'
              : 'font-medium hover:text-sky-reflection'
          "
        >
          {{ item.label }}
        </a>
      </nav>
    </aside>
  </div>
</header>
